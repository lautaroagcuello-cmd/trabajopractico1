<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="css/estilos.css">
</head>

<body class="body">
    
    <!-- El header inica que es el menú y
      el nav que tiene enlaces de navegación dentro de él-->
    <header class="header">
            <h1>
                 Bienvenidos a mi sitio
            </h1>
        
            <hr>
        
        <nav> 
            <button>
                <a href="./infopropia.html">
                    CONTACTO
                </a>
            </button>
            
            <br>
    
            <button>
                <a href="./infopropia.html">
                    UN POCO MÁS DE MI
                </a>
            </button>
        </nav>
    </header>

    <main>
        <!-- Contenido principal -->
        <!-- el label y el imput debe ser igual al name del imput-->
        <br>
    </main>

    <hr>
    <hr>
    
    <!-- El footer iría en la parte de abajo de la pagina, pero no recuerdo como hacerlo-->
    <footer class="footer">
        <h3> Consulta </h3>
        <p>
            Si tenes alguna duda o consulta que quieras hacerme te invito a llenar este formulario
            para que pueda ponerme en contacto con vos lo antes posible.
        </p>

        <form class="form" action="#" method="get">
            <div class="flex-space-evenly">
                <label for= "nombre"> Nombre:</label>
                <input type="text" placeholder="Escribí tu nombre" name="nombre">
            </div>
            
            <div>
                <label for="password"> Contraseña: </label>
                <input type="password" placeholder="Escribí tu contraseña" name="password">
            </div>
            
            <div>
                <label for="date"> Nacimiento: </label>
                <input type="date" name="date">
            </div>

            <div>
                <label for="observaciones"> Observaciones: </label>
                <input type="text"placeholder="¿Algo que agregar?" name="observaciones">
            </div>
           
            <div>
                <label for="genero"> Genero: </label>
                <input type="radio" name="genero" value="Masculino"> Masculino
                <input type="radio" name="genero" value="Femenino"> Femenino
                <input type="radio" name="genero" value="PEN"> Prefiero no especificar
            </div>
        </form> 
    <br>
    <br>
    
    </footer>
